<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Log-In</title>

	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <link href="styles.css" rel="stylesheet">

	<style>
		body{
    		background: url(bg1.png);
    		background-size: cover;
    		text-align: center;
    	}
    	#log-in{
    		justify-self: center;
    		width: 30%;
    		padding: 3%;
    		margin: 5%;
    		border-radius: 25px;
    		box-shadow: rgba(0, 0, 0, 0.3) 0px 5px 5px 3px;
    		background-color: white;
    		text-align: center;
    	}
    	form{
    		justify-self: center;
    	}
    	label{
    		font-size: 20px;
    		margin-bottom: 5px;
    	}
    	.checkbox-row {
    	    display: flex;
    	    gap: 10px;
    	    margin-bottom: 20px;
    	    justify-self: center;
    	}

    	.checkbox-row input {
    	    width: 15px;
    	    height: 15px;
    	    margin: 0;
    	}
    	.checkbox-row label {
    	    display: inline;
    	    font-size: 15px;
    	    margin: 0;
    	    margin-bottom: 10px;
    	}
    	#loginbtn{
    		color: #004d36;
    		background-color: #00a172;
    		border-color: #004d36;
    		font-weight: bold;
    	}

    	#loginbtn:hover {
    	    transform: scale(1.075);
    	    background-color: #004d36;
    	    color: #00a172;
    	    border-color: #004d36;
    	}
	</style>
	
</head>
<body>

	<div id="log-in">
		<img src="OBMC LOGO.png" alt="logo.png" style="width: 150px;">
		<h1>LOG-IN</h1>

		<form>
			<label for="user">USERNAME</label>
			<br>
			<input type="text" class="form-control" id="user" placeholder="Enter your username here">
			<br>
			<label for="user">PASSWORD</label>
			<br>
			<input type="password" class="form-control" id="pass" placeholder="Enter your password here">
			<br>
			<div class="checkbox-row">
				<input type="checkbox" class="form-check" id="check">
				<label for="check">Remember me</label>
			</div>

			<div class="button">
                <button type="button" class="form-control" id="loginbtn" onclick="login()">Log In</button>
			</div>
		</form>
	</div>

	<script>
		var correctuser = "Emerald";
		var correctpass = "12345";

		var attempt = 0;
		var maxtry = 3;

		function login(){
			var user = document.getElementById("user").value;
			var pass = document.getElementById("pass").value;

			if (attempt === maxtry) {
				alert("Account locked. Too many failed attempts.");
				document.getElementById("loginbtn").disabled = true;
				return;
			}

			if (user === correctuser && pass === correctpass){
					alert("Login successful!");
					// window transfer to dashboard.html to be added here
				}
			else{
				attempt++;
				var remaining = maxtry - attempt;
				        
				if (remaining > 0) {
				    alert("Log-in failed. " + remaining + " attempt/s left.");
				} 
				else{
				    alert("Account locked. Too many failed attempts.");
				    document.getElementById("loginbtn").disabled = true;
				}
			}
		}
	</script>

</body>
</html>
